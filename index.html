<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金在民 · 摄影</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Helvetica Neue', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .photo {
            position: relative;
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 4/3;
        }

        .photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .photo:hover img {
            transform: scale(1.03);
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90vh;
            object-fit: contain;
        }

        footer {
            text-align: center;
            padding: 3rem;
            color: #555;
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            .gallery {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>金在民 · 摄影</h1>
        </header>

        <div class="gallery">
            <div class="photo" onclick="openLightbox(this)">
                <img src="assets/photo1.jpg" alt="photo1">
            </div>

            <div class="photo" onclick="openLightbox(this)">
                <img src="assets/photo2.jpg" alt="photo2">
            </div>

            <div class="photo" onclick="openLightbox(this)">
                <img src="assets/photo3.jpg" alt="photo3">
            </div>
        </div>
    </div>

    <footer>
        <p>金在民 · 摄影</p>
    </footer>

    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <img src="" alt="" id="lightbox-img">
    </div>

    <script>
        function openLightbox(el) {
            const img = el.querySelector('img');
            document.getElementById('lightbox-img').src = img.src;
            document.getElementById('lightbox').classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }
    </script>
</body>
</html>
